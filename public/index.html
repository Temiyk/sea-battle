<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Морской бой</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="lobby" id="lobby">
    <div class="lobby-card">
        <h1>Морской Бой</h1>
        <p>Сразитесь с друзьями онлайн</p>
        <div id="lobby-controls">
            <button id="btn-create" class="btn primary-btn">Создать комнату</button>
            <div class="divider">или</div>
            <input type="text" id="room-id" placeholder="ID комнаты">
            <button id="btn-join" class="btn secondary-btn">Войти в игру</button>
        </div>
        <p id="lobby-status" class="status-text"></p>
        <button id="btn-back-to-placement" class="btn back-btn hidden">&#8592; Изменить расстановку</button>
    </div>
</div>

<div class="placement-area" id="placement-area" style="display: none;">
    <h2 id="placement-status">Перетяните корабли на поле</h2>
    <div class="placement-controls">
        <p style="font-size: 14px; color: #7f8c8d; width: 100%; margin: 0 0 10px 0;">(Кликните по кораблю на поле, чтобы повернуть его)</p>
    </div>
    <div id="ship-dock" class="ships-dock"></div>

    <div id="placement-board" class="board"></div>

    <div class="placement-controls" style="margin-top: 20px;">
        <button id="btn-randomize" class="btn secondary-btn">Случайно</button>
        <button id="btn-reset" class="btn secondary-btn">Сбросить</button>
        <button id="btn-ready" class="btn success-btn" disabled>Готов к бою!</button>
    </div>
</div>

<div class="game-area" id="game-area" style="display: none;">
    <h2 id="status" style="text-align: center; margin-bottom: 20px;"></h2>

    <div class="boards-container">
        <div class="board-wrapper">
            <h3>Моё поле</h3>
            <div id="my-board" class="board"></div>
            <div id="my-fleet" class="fleet-status"></div>
        </div>

        <div id="turn-indicator" class="turn-indicator"></div>

        <div class="board-wrapper">
            <h3>Поле противника</h3>
            <div id="enemy-board" class="board disabled"></div>
            <div id="enemy-fleet" class="fleet-status"></div>
        </div>
    </div>
</div>

<div id="game-over-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2 id="modal-title">Игра окончена</h2>

        <div id="game-stats" class="game-stats"></div>

        <div class="modal-buttons">
            <button id="btn-rematch" class="btn primary-btn">Предложить реванш</button>
            <button id="btn-menu" class="btn secondary-btn">В главное меню</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/ui.js"></script>
<script src="js/socket-client.js"></script>
<script src="js/app.js"></script>
</body>
</html>
